<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Klivvr Scripts</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect width='24' height='24' rx='5' fill='%230a0a0a'/><path d='M3 3h18v3H3V3zm0 5h12v3H3V8zm0 5h18v3H3v-3zm0 5h12v3H3v-3z' fill='%237ecece'/></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="app">

  <div id="topbar">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24"><path d="M3 3h18v3H3V3zm0 5h12v3H3V8zm0 5h18v3H3v-3zm0 5h12v3H3v-3z"/></svg>
      </div>
      <div class="brand-name">Klivvr Scripts</div>
    </div>
    <div class="vr"></div>
    <span id="sheet-label">—</span>
    <div class="spacer"></div>
    <div id="conn-dot"></div>
    <button class="btn sm primary" id="btn-auth" onclick="handleAuth()" style="display:none">Sign in</button>
    <button class="btn sm ghost"   id="btn-out"  onclick="signOut()"    style="display:none">Sign out</button>
  </div>

  <div id="error-screen"><h2>Not configured</h2></div>

  <div id="main-view">
    <div id="toolbar">
      <div id="search-wrap">
        <span class="s-ico">⌕</span>
        <input type="text" id="search" placeholder="Search…" oninput="debouncedSearch()" autocomplete="off" spellcheck="false" />
        <button id="search-clear" onclick="clearSearch()" title="Clear">✕</button>
      </div>
      <button class="btn sm" id="btn-refresh" onclick="loadData()">↻</button>
      <button class="btn sm primary" id="btn-add" onclick="openAdd()">+ Add</button>
      <div id="row-count"></div>
    </div>
    <div id="scroll-area">
      <div id="groups-container"></div>
      <div id="empty-state">No rows found</div>
    </div>
  </div>

</div>

<div id="loader"><div class="spinner"></div><p id="loader-msg">Loading…</p></div>

<div id="edit-overlay" class="overlay">
  <div class="modal">
    <div class="drag-handle"></div>
    <div class="modal-head">
      <h2 id="modal-title">Row</h2>
      <button class="btn ghost icon" onclick="close_('edit-overlay')">✕</button>
    </div>
    <div class="modal-body" id="modal-fields"></div>
    <div class="modal-foot">
      <button class="btn ghost" onclick="close_('edit-overlay')">Cancel</button>
      <button class="btn primary" onclick="saveRow()">Save</button>
    </div>
  </div>
</div>

<div id="del-overlay" class="overlay">
  <div class="modal sm">
    <div class="drag-handle"></div>
    <div class="modal-head">
      <h2>Delete row</h2>
      <button class="btn ghost icon" onclick="close_('del-overlay')">✕</button>
    </div>
    <div class="modal-body">
      <p class="confirm-msg">This row will be permanently removed from the spreadsheet.</p>
    </div>
    <div class="modal-foot">
      <button class="btn ghost" onclick="close_('del-overlay')">Cancel</button>
      <button class="btn danger" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div id="toasts"></div>
<script src="app.js"></script>
</body>
</html>
